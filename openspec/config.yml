schema: spec-driven

context: |
  Project: Myanmar delivery management web app
  Type: Internal commercial web application for a local delivery business
  Primary users: Admin, office staff/dispatcher, rider
  Future user: Merchant portal user

  Reference docs:
  - docs/project-requirements.md
  - docs/core-workflows.md

  Instruction:
  - Use the reference docs as the primary source of truth for business requirements, workflows, and MVP boundaries.
  - Prefer the reference docs over assumptions when generating proposals, specs, tasks, and code.

  Business domain:
  - Merchant = shop/seller/client who uses our delivery service to send parcels
  - Receiver = end customer who receives the parcel
  - Rider = delivery staff
  - COD = cash collected from receiver and later settled back to merchant after deducting delivery fees or other charges
  - Settlement = process of calculating how much money must be paid back to each merchant